<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raktim Debnath</title>
    <style>
        /* === DARK MODE (Default) === */
        :root {
            --bg-color: #111111;
            --text-color: #ffffff;
            --link-color: #8B0000;
            --nav-line: #444444;
        }

        /* === LIGHT MODE === */
        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #111111;
            --link-color: #DC143C;
            --nav-line: #cccccc;
        }

        /* === MAIN PAGE STYLE === */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Courier New", Courier, monospace; 
            max-width: 700px; 
            margin: 40px auto;
            padding: 0 20px;
            transition: background-color 0.4s, color 0.4s; 
        }

        /* === NAVIGATION BAR === */
        nav {
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            border-bottom: 1px solid var(--nav-line);
            padding-bottom: 20px;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        a {
            color: var(--link-color);
            text-decoration: none; 
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline; 
        }

        /* === THEME BUTTON === */
        #theme-btn {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
            float: right; 
            margin-bottom: 20px;
        }
        
        #theme-btn:hover {
            opacity: 0.7;
        }

        /* === PROFILE LAYOUT === */
        .profile-container {
            display: flex; 
            align-items: center; 
            gap: 30px; 
            margin-top: 20px;
        }

        .profile-pic {
            max-width: 250px; /* Stops the image from getting too massive */
            width: auto;      /* Relies on your file's natural width */
            height: auto;     /* Locks in the exact, original aspect ratio */
            border-radius: 4px;
            flex-shrink: 0; 
            border: 2px solid var(--nav-line); 
        }

        /* Mobile stacking rule */
        @media (max-width: 500px) {
            .profile-container {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <button id="theme-btn" onclick="toggleTheme()">🌓 Switch Theme</button>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="notes.html">Notes</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="profile-container">
        <img src="website pic.jpg" alt="Raktim" class="profile-pic">
        
        <div class="profile-text">
            <h1>Hi, I'm Raktim.</h1>
            <p>Welcome to my corner of the internet. This site is currently under construction, building it brick by brick.</p>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
        }
    </script>
</body>
</html>
